events {}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;

  server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
      try_files $uri $uri/ /index.html;
    }

    location /_app/ {
      try_files $uri =404;
      add_header Cache-Control "public, immutable, max-age=31536000";
    }
  }
}
