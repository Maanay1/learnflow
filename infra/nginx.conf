limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;

upstream learnflow_backend {
  server backend:4000;
}

upstream learnflow_frontend {
  server frontend:3000;
}

server {
  listen 80;
  server_name learnflow.example.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name learnflow.example.com;

  ssl_certificate /etc/letsencrypt/live/learnflow.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/learnflow.example.com/privkey.pem;

  client_max_body_size 5g;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;
  gzip_min_length 1024;

  location /api/auth/ {
    limit_req zone=auth_limit burst=20 nodelay;
    proxy_pass http://learnflow_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location /api/ {
    proxy_pass http://learnflow_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location /health {
    proxy_pass http://learnflow_backend;
    proxy_set_header Host $host;
  }

  location /metrics {
    allow 127.0.0.1;
    allow 172.16.0.0/12;
    deny all;
    proxy_pass http://learnflow_backend;
  }

  location /socket/ {
    proxy_pass http://learnflow_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
  }

  location /_app/immutable/ {
    proxy_pass http://learnflow_frontend;
    proxy_set_header Host $host;
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  location / {
    proxy_pass http://learnflow_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}
