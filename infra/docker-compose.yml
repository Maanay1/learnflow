services:
  postgres:
    image: postgres:16-alpine
    container_name: learnflow_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: learnflow_dev
      POSTGRES_USER: learnflow
      POSTGRES_PASSWORD: devpassword123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learnflow -d learnflow_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: learnflow_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: learnflow_backend
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DATABASE_URL: ecto://learnflow:devpassword123@postgres:5432/learnflow_dev
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: http://localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET_VIDEOS: learnflow-videos
      MINIO_BUCKET_THUMBNAILS: learnflow-thumbnails
      MINIO_BUCKET_CERTIFICATES: learnflow-certificates
      MINIO_BUCKET_AVATARS: jarq-avatars
      SECRET_KEY_BASE: dev_secret_key_base_change_me_for_production_64_bytes_minimum
      PHX_HOST: localhost
      PORT: 4000
      MIX_ENV: prod
      FRONTEND_URL: http://localhost:3000
      PUBLIC_URL: http://localhost:3000
      BACKEND_URL: http://localhost:4000
      API_PUBLIC_URL: http://localhost:4000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:4000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: learnflow_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      ORIGIN: http://localhost:3000
      VITE_API_URL: http://localhost:4000
      VITE_WS_URL: ws://localhost:4000/socket
      VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-pk_test_local}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
  minio_data:
