x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-learnflow_prod}
      POSTGRES_USER: ${POSTGRES_USER:-learnflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-learnflow} -d ${POSTGRES_DB:-learnflow_prod}"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - path: .env.production
        required: false
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/${GHCR_REPOSITORY}/backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      PORT: 4000
      PHX_HOST: ${DOMAIN}
      GIT_SHA: ${IMAGE_TAG:-latest}
      MINIO_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    expose:
      - "4000"
    mem_limit: 512m
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    image: ghcr.io/${GHCR_REPOSITORY}/frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      ORIGIN: https://${DOMAIN}
      VITE_API_URL: https://${DOMAIN}
      VITE_WS_URL: wss://${DOMAIN}/socket
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "3000"
    mem_limit: 256m
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 12

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    logging: *default-logging

volumes:
  postgres_data:
  minio_data:
